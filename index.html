*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.1rem}
.tab{font-size:13px;padding:7px 14px;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab.active{color:var(--color-text-primary);font-weight:500;border-bottom-color:var(--color-text-primary)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.6rem 0.85rem}
.stat-l{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px}
.stat-v{font-size:20px;font-weight:500}
.stat-v.red{color:#E24B4A}.stat-v.grn{color:#1D9E75}
.toolbar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:0.85rem;align-items:center}
.toolbar input[type=text]{flex:1;min-width:130px;font-size:13px;padding:5px 9px;height:30px}
.toolbar select{font-size:12px;padding:3px 7px;height:30px;min-width:95px}
.btn{font-size:12px;padding:4px 11px;height:30px;cursor:pointer;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.btn.primary:hover{opacity:.85}
.btn.sm{font-size:11px;height:24px;padding:2px 8px}
.btn.success{color:#0F6E56;border-color:#9FE1CB}.btn.success:hover{background:#E1F5EE}
.btn.danger{color:#A32D2D;border-color:#F09595}.btn.danger:hover{background:#FCEBEB}
.badge{display:inline-flex;align-items:center;font-size:10px;padding:1px 6px;border-radius:var(--border-radius-md);font-weight:500}
.badge.pla{background:#EAF3DE;color:#3B6D11}.badge.petg{background:#E6F1FB;color:#185FA5}
.badge.abs{background:#FAECE7;color:#993C1D}.badge.tpu{background:#FBEAF0;color:#993556}
.badge.asa{background:#FAEEDA;color:#854F0B}.badge.pa{background:#EEEDFE;color:#3C3489}
.badge.cf{background:#F1EFE8;color:#444441}.badge.other{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.badge.in{background:#E1F5EE;color:#0F6E56}.badge.out{background:#FCEBEB;color:#A32D2D}
.badge.wish{background:#E6F1FB;color:#185FA5}
.count-bar{font-size:12px;color:var(--color-text-secondary);margin-bottom:0.6rem}

/* COLOR PALETTE BROWSER */
.color-family-section{margin-bottom:1.5rem}
.family-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em}
.color-swatches{display:flex;flex-wrap:wrap;gap:6px}
.swatch-btn{width:36px;height:36px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s;flex-shrink:0}
.swatch-btn:hover{transform:scale(1.15)}
.swatch-btn.active{border-color:var(--color-text-primary);transform:scale(1.15)}
.swatch-btn.active-out{border-color:#E24B4A}
.swatch-tooltip{font-size:11px;color:var(--color-text-secondary);margin-top:4px}

/* SHOP GRID - color-first view */
.shop-list{display:flex;flex-direction:column;gap:7px}
.shop-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary)}
.shop-row:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.swatch-lg{width:32px;height:32px;border-radius:50%;border:0.5px solid rgba(0,0,0,0.15);flex-shrink:0}
.row-info{flex:1;min-width:0}

.row-sub{font-size:11px;color:var(--color-text-secondary);display:flex;gap:5px;align-items:center;margin-top:2px;flex-wrap:wrap}
.row-price{font-size:13px;font-weight:500;white-space:nowrap;margin-right:4px}
.row-actions{display:flex;gap:5px;flex-shrink:0}

/* BRAND CARDS view */
.brand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}

.brand-swatches{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.mini-swatch{width:20px;height:20px;border-radius:50%;border:0.5px solid rgba(0,0,0,0.12);cursor:pointer;flex-shrink:0}
.mini-swatch:hover{transform:scale(1.2)}

/* INVENTORY */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px}

.inv-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.dot{width:30px;height:30px;border-radius:50%;border:0.5px solid rgba(0,0,0,0.12);flex-shrink:0}
.inv-name{font-size:13px;font-weight:500;line-height:1.3}
.inv-brand{font-size:11px;color:var(--color-text-secondary)}
.inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:2px 7px;font-size:11px;margin-bottom:7px}
.inv-meta span{color:var(--color-text-secondary)}
.inv-meta strong{font-weight:500}
.prog{height:4px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden;margin-bottom:6px}
.prog-f{height:100%;border-radius:2px}
.inv-actions{display:flex;gap:5px}
.inv-actions .btn{flex:1;justify-content:center}

/* ADD FORM */
.form-wrap{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1.1rem;max-width:480px;margin:0 auto}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg.full{grid-column:1/-1}

function matchesColorFilter(itemHex){if(!selColorHex)return true;return colorDist(itemHex,selColorHex)<COLOR_DIST}

  {brand:'Ultimaker',type:'PLA',name:'PLA',color:'Pearl White',hex:'#f5f0e8',size:750,price:34.99,inStock:true,url:'https://ultimaker.com'},
  {brand:'Ultimaker',type:'PLA',name:'PLA',color:'Black',hex:'#1a1a1a',size:750,price:34.99,inStock:true,url:'https://ultimaker.com'},
  {brand:'Ultimaker',type:'PETG',name:'Tough PLA',color:'White',hex:'#f8f8f8',size:750,price:39.99,inStock:false,url:'https://ultimaker.com'},

  {brand:'Raise3D',type:'PA',name:'PA12 CF',color:'Black',hex:'#1a1a1a',size:1000,price:79.99,inStock:false,url:'https://raise3d.com'},

  {brand:'Matter3D',type:'PLA',name:'Industrial PLA',color:'White',hex:'#f5f5f0',size:1000,price:18.99,inStock:true,url:'https://matter3d.com'},
  {brand:'Matter3D',type:'PLA',name:'Industrial PLA',color:'Black',hex:'#1a1a1a',size:1000,price:18.99,inStock:true,url:'https://matter3d.com'},
];

const BRAND_CLR={
  BambuLab:'#4caf50',Anycubic:'#E24B4A',Sunlu:'#378ADD',Polymaker:'#7F77DD',
  Prusament:'#FF6B00',Hatchbox:'#1D9E75',eSUN:'#D85A30',Overture:'#D4537E',
  Creality:'#FA6400',Elegoo:'#3366CC',Inland:'#C0392B',Matter3D:'#2C3E50',
  Amolen:'#B87333',Duramic:'#16A085',Eryone:'#8E44AD',Fiberlogy:'#27AE60',
  FormFutura:'#2980B9',Fillamentum:'#E67E22',ColorFabb:'#E74C3C',
  '3DXTech':'#2C3E50',Raise3D:'#8E44AD',Ultimaker:'#00AEEF','Proto-pasta':'#C0392B'
};

function bi(b){const c=BRAND_CLR[b]||'#888';return`<div class="brand-icon" style="background:${c}20;color:${c}">${b.slice(0,2).toUpperCase()}</div>`}
function bc(t){return{PLA:'pla',PETG:'petg',ABS:'abs',TPU:'tpu',ASA:'asa',PA:'pa',CF:'cf'}[t]||'other'}
function pc(p){return p<15?'#E24B4A':p<30?'#EF9F27':'#1D9E75'}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function sz(s){return s>=1000?(s/1000)+'kg':s+'g'}

async function load(){
  try{const r=await window.storage.get(SK);if(r&&r.value)spools=JSON.parse(r.value)}catch(e){}
  try{const r=await window.storage.get(WK);if(r&&r.value)wishlist=JSON.parse(r.value)}catch(e){}
  if(!spools.length)spools=[
    {id:uid(),name:'PLA Basic',brand:'BambuLab',type:'PLA',color:'Jade White',hex:'#f5f5f0',size:1000,remaining:85,cost:24.99,bundle:1,notes:''},
    {id:uid(),name:'PLA Basic',brand:'BambuLab',type:'PLA',color:'Bambu Green',hex:'#5aaf6e',size:1000,remaining:30,cost:24.99,bundle:1,notes:''},
    {id:uid(),name:'PolyTerra PLA',brand:'Polymaker',type:'PLA',color:'Muted Blue',hex:'#5b8fa8',size:1000,remaining:60,cost:19.99,bundle:1,notes:'Matte'},
    {id:uid(),name:'PETG',brand:'Sunlu',type:'PETG',color:'Transparent',hex:'#d0e8f2',size:1000,remaining:12,cost:16.99,bundle:3,notes:''},
  ];
  buildBrandFilter();renderStats();renderShop();renderInventory();renderWishlist();buildFamilySwatches();
}

async function saveS(){try{await window.storage.set(SK,JSON.stringify(spools))}catch(e){}}
async function saveW(){try{await window.storage.set(WK,JSON.stringify(wishlist))}catch(e){}}

function buildBrandFilter(){
  const brands=[...new Set(CATALOG.map(c=>c.brand))].sort();
  const el=document.getElementById('sBrand');
  const cur=el.value;
  el.innerHTML='<option value="">All brands</option>'+brands.map(b=>`<option${b===cur?' selected':''}>${b}</option>`).join('');
  const ib=document.getElementById('iBrand');
  const ic=ib.value;
  const mb=[...new Set(spools.map(s=>s.brand))].sort();
  ib.innerHTML='<option value="">All brands</option>'+mb.map(b=>`<option${b===ic?' selected':''}>${b}</option>`).join('');
}

function buildFamilySwatches(){
  const el=document.getElementById('family-swatches');
  el.innerHTML=COLOR_FAMILIES.map(f=>`
    <div class="color-family-section">
      <div class="family-label">${f.name}</div>
      <div class="color-swatches">
        ${f.swatches.map(s=>{
          const cnt=CATALOG.filter(c=>matchesColorHex(c.hex,s.hex)).length;
          return `<div title="${s.label} (${cnt} products)" class="swatch-btn" style="background:${s.hex};border-color:${selColorHex===s.hex?'var(--color-text-primary)':'transparent'}" onclick="setColorFilter('${s.hex}','${s.label}')"></div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function matchesColorHex(itemHex,filterHex){
  const[r1,g1,b1]=hexToRgb(itemHex),[r2,g2,b2]=hexToRgb(filterHex);
  return Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2)<COLOR_DIST;
}
function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}

function setColorFilter(hex,name){
  if(selColorHex===hex){selColorHex=null;selColorName=''}
  else{selColorHex=hex;selColorName=name}
  document.getElementById('active-color-label').textContent=selColorHex?`Showing: ${selColorName}`:'';
  buildFamilySwatches();renderShop();
}
function clearColorFilter(){selColorHex=null;selColorName='';document.getElementById('active-color-label').textContent='';buildFamilySwatches();renderShop()}

function filteredCatalog(){
  const search=document.getElementById('sSearch').value.toLowerCase();
  const brand=document.getElementById('sBrand').value;
  const type=document.getElementById('sType').value;
  const avail=document.getElementById('sAvail').value;
  const maxP=parseFloat(document.getElementById('sMaxPrice')?document.getElementById('sMaxPrice').value:document.getElementById('sPrice').value)||Infinity;
  return CATALOG.filter(c=>{
    if(search&&!`${c.name} ${c.brand} ${c.color} ${c.type}`.toLowerCase().includes(search))return false;
    if(brand&&c.brand!==brand)return false;
    if(type&&c.type!==type)return false;
    if(avail==='in'&&!c.inStock)return false;
    if(avail==='out'&&c.inStock)return false;
    if(c.price>maxP)return false;
    if(selColorHex&&!matchesColorHex(c.hex,selColorHex))return false;
    return true;
  });
}

function renderShop(){
  const items=filteredCatalog();
  const view=document.getElementById('sView').value;
  document.getElementById('sCount').textContent=`${items.length} product${items.length!==1?'s':''} from ${[...new Set(items.map(c=>c.brand))].length} brands`;
  const el=document.getElementById('shop-content');
  if(!items.length){el.innerHTML='<div class="empty">No products match your filters.</div>';return}
  if(view==='list'){
    el.innerHTML=`<div class="shop-list">${items.map(c=>shopRow(c)).join('')}</div>`;
  } else if(view==='brand'){
    const byBrand={};
    items.forEach(c=>{if(!byBrand[c.brand])byBrand[c.brand]=[];byBrand[c.brand].push(c)});
    el.innerHTML=`<div class="brand-grid">${Object.entries(byBrand).map(([brand,list])=>`
      <div class="brand-card">
        <div class="brand-header">${bi(brand)}<div>
          <div style="font-size:13px;font-weight:500">${brand}</div>
          <div style="font-size:11px;color:var(--color-text-secondary)">${list.length} product${list.length!==1?'s':''}</div>
        </div></div>
        <div class="brand-swatches">${list.map(c=>`<div class="mini-swatch" style="background:${c.hex}" title="${c.color} – ${c.name} ($${c.price.toFixed(2)}) ${c.inStock?'✓ in stock':'✗ out'}" onclick="selectFromBrand(${JSON.stringify(c).replace(/"/g,'&quot;')})"></div>`).join('')}</div>
        <div class="shop-list">${list.slice(0,3).map(c=>shopRow(c)).join('')}${list.length>3?`<div style="font-size:11px;color:var(--color-text-secondary);padding:4px 8px">+${list.length-3} more — switch to list view</div>`:''}</div>
      </div>
    `).join('')}</div>`;
  } else {
    const byFamily=[];
    COLOR_FAMILIES.forEach(f=>{
      const fi=items.filter(c=>f.swatches.some(s=>matchesColorHex(c.hex,s.hex)));
      if(fi.length)byFamily.push({name:f.name,items:fi});
    });
    const uncat=items.filter(c=>!COLOR_FAMILIES.some(f=>f.swatches.some(s=>matchesColorHex(c.hex,s.hex))));
    if(uncat.length)byFamily.push({name:'Other',items:uncat});
    el.innerHTML=byFamily.map(({name,items:gi})=>`
      <div style="margin-bottom:1.25rem">
        <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em">${name} <span style="font-weight:400">(${gi.length})</span></div>
        <div class="shop-list">${gi.map(c=>shopRow(c)).join('')}</div>
      </div>
    `).join('');
  }
}

function shopRow(c){
  const esc=JSON.stringify(c).replace(/"/g,'&quot;');
  return `<div class="shop-row">
    <div class="swatch-lg" style="background:${c.hex}"></div>
    <div class="row-info">
      <div class="row-name">${c.brand} ${c.name} – ${c.color}</div>
      <div class="row-sub">
        <span class="badge ${bc(c.type)}">${c.type}</span>
        <span class="badge ${c.inStock?'in':'out'}">${c.inStock?'In stock':'Out of stock'}</span>
        <span style="font-size:10px;color:var(--color-text-secondary)">${sz(c.size)}</span>
      </div>
    </div>
    <span class="row-price">$${c.price.toFixed(2)}</span>
    <div class="row-actions">
      ${c.inStock
        ?`<button class="btn sm success" onclick="addToInv(${esc})">+ Add</button>`
        :`<button class="btn sm wish" onclick="addToWish(${esc})">Wishlist</button>`
      }
    </div>
  </div>`;
}

function selectFromBrand(c){
  document.getElementById('sView').value='list';
  renderShop();
}

function addToInv(c){
  spools.push({id:uid(),name:c.name,brand:c.brand,type:c.type,color:c.color,hex:c.hex,size:c.size,remaining:100,cost:c.price,bundle:1,notes:''});
  saveS();buildBrandFilter();renderStats();renderInventory();
  showTab('inventory');
}

function addToWish(c){
  if(wishlist.find(w=>w.brand===c.brand&&w.name===c.name&&w.color===c.color))return;
  wishlist.push({...c,wid:uid()});
  saveW();renderStats();renderWishlist();
  showTab('wishlist');
}

function renderInventory(){
  const search=document.getElementById('iSearch').value.toLowerCase();
  const brand=document.getElementById('iBrand').value;
  const type=document.getElementById('iType').value;
  const stock=document.getElementById('iStock').value;
  const sort=document.getElementById('iSort').value;
  let f=spools.filter(s=>{
    if(search&&!`${s.name} ${s.brand} ${s.color} ${s.type}`.toLowerCase().includes(search))return false;
    if(brand&&s.brand!==brand)return false;
    if(type&&s.type!==type)return false;
    if(stock==='low'&&s.remaining>=25)return false;
    if(stock==='ok'&&s.remaining<25)return false;
    return true;
  });
  f.sort((a,b)=>sort==='cost'?(b.cost||0)-(a.cost||0):sort==='remaining'?a.remaining-b.remaining:sort==='brand'?a.brand.localeCompare(b.brand):a.name.localeCompare(b.name));
  document.getElementById('iCount').textContent=`${f.length} of ${spools.length} spools`;
  const g=document.getElementById('inv-grid');
  if(!f.length){g.innerHTML='<div class="empty">No spools match your filters.</div>';return}
  g.innerHTML=f.map(s=>{
    const pct=Math.round(s.remaining);
    const g2=Math.round(s.size*pct/100);
    const low=pct<25;
    return `<div class="inv-card${low?' low':''}">
      <div class="inv-top">
        <div class="dot" style="background:${s.hex}"></div>
        <div style="flex:1;min-width:0"><div class="inv-name">${s.name}</div><div class="inv-brand">${s.brand} · ${s.color}</div></div>
        <span class="badge ${bc(s.type)}">${s.type}</span>
      </div>
      <div class="prog"><div class="prog-f" style="width:${pct}%;background:${pc(pct)}"></div></div>
      <div class="inv-meta">
        <span>Remaining</span><strong>${pct}% (~${g2}g)</strong>
        <span>Size</span><strong>${sz(s.size)}</strong>
        <span>Cost</span><strong>$${((s.cost||0)*(s.bundle||1)).toFixed(2)}</strong>
        <span>$/kg</span><strong>${s.cost&&s.size?'$'+((s.cost/(s.size/1000)).toFixed(2)):'—'}</strong>
      </div>
      ${s.notes?`<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px;font-style:italic">${s.notes}</div>`:''}
      <div class="inv-actions">
        <button class="btn sm" onclick="useSpool('${s.id}')">Use</button>
        <button class="btn sm" onclick="editSpool('${s.id}')">Edit</button>
        <button class="btn sm danger" onclick="delSpool('${s.id}')">Remove</button>
      </div>
    </div>`;
  }).join('');
}

function renderWishlist(){
  const g=document.getElementById('wish-list');
  document.getElementById('wCount').textContent=`${wishlist.length} item${wishlist.length!==1?'s':''} on wishlist`;
  if(!wishlist.length){g.innerHTML='<div class="empty">Browse the shop and wishlist out-of-stock items to track them here.</div>';return}
  g.innerHTML=wishlist.map(w=>`
    <div class="wish-item">
      <div class="dot" style="background:${w.hex};width:28px;height:28px;flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500">${w.brand} ${w.name} – ${w.color}</div>
        <div style="display:flex;gap:5px;margin-top:2px;align-items:center;flex-wrap:wrap">
          <span class="badge ${bc(w.type)}">${w.type}</span>
          <span style="font-size:11px;color:var(--color-text-secondary)">$${w.price.toFixed(2)} · ${sz(w.size)}</span>
        </div>
      </div>
      <div style="display:flex;gap:5px">
        <a href="${w.url}" class="btn sm">Buy</a>
        <button class="btn sm danger" onclick="rmWish('${w.wid}')">Remove</button>
      </div>
    </div>
  `).join('');
}

function renderStats(){
  const total=spools.length,low=spools.filter(s=>s.remaining<25).length;
  const val=spools.reduce((a,s)=>a+(s.cost||0)*(s.bundle||1),0);
  const inStock=CATALOG.filter(c=>c.inStock).length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="stat-l">My spools</div><div class="stat-v">${total}</div></div>
    <div class="stat"><div class="stat-l">Low stock</div><div class="stat-v red">${low}</div></div>
    <div class="stat"><div class="stat-l">Wishlist</div><div class="stat-v">${wishlist.length}</div></div>
    <div class="stat"><div class="stat-l">Inventory value</div><div class="stat-v">$${val.toFixed(0)}</div></div>
    <div class="stat"><div class="stat-l">Shop in-stock</div><div class="stat-v grn">${inStock}</div></div>
  `;
}

function useSpool(id){
  const s=spools.find(x=>x.id===id);if(!s)return;
  const a=prompt(`Grams used from "${s.name} – ${s.color}"?\n(~${Math.round(s.size*s.remaining/100)}g remaining)`);
  if(a===null)return;const g=parseFloat(a);if(isNaN(g)||g<0)return;
  s.remaining=Math.max(0,Math.round(s.remaining-(g/s.size*100)));saveS();renderStats();renderInventory();
}

function editSpool(id){
  const s=spools.find(x=>x.id===id);if(!s)return;
  editId=id;document.getElementById('formTitle').textContent='Edit spool';document.getElementById('delBtn').style.display='';
  document.getElementById('fName').value=s.name;
  const bs=document.getElementById('fBrandSel');
  if([...bs.options].some(o=>o.value===s.brand)){bs.value=s.brand;document.getElementById('cbRow').style.display='none'}
  else{bs.value='Custom...';document.getElementById('cbRow').style.display='';document.getElementById('fBrandCustom').value=s.brand}
  document.getElementById('fTypeIn').value=s.type;
  document.getElementById('fColorName').value=s.color;
  document.getElementById('fColorHex').value=s.hex||'#cccccc';
  document.getElementById('fSize').value=s.size;
  document.getElementById('fRemain').value=s.remaining;
  document.getElementById('fCost').value=s.cost||'';
  document.getElementById('fBundle').value=s.bundle||1;
  document.getElementById('fNotes').value=s.notes||'';
  showTab('add');
}

function delSpool(id){if(!confirm('Remove this spool?'))return;spools=spools.filter(x=>x.id!==id);saveS();buildBrandFilter();renderStats();renderInventory();}
function doDelete(){if(!editId)return;if(!confirm('Remove this spool?'))return;spools=spools.filter(x=>x.id!==editId);editId=null;saveS();buildBrandFilter();renderStats();renderInventory();showTab('inventory');}
function rmWish(wid){wishlist=wishlist.filter(w=>w.wid!==wid);saveW();renderStats();renderWishlist();}

function doSave(){
  const bv=document.getElementById('fBrandSel').value;
  const brand=bv==='Custom...'?document.getElementById('fBrandCustom').value.trim():bv;
  const d={name:document.getElementById('fName').value.trim()||'Unnamed',brand:brand||'Unknown',type:document.getElementById('fTypeIn').value,color:document.getElementById('fColorName').value.trim()||'Unknown',hex:document.getElementById('fColorHex').value,size:parseInt(document.getElementById('fSize').value),remaining:Math.max(0,Math.min(100,parseFloat(document.getElementById('fRemain').value)||0)),cost:parseFloat(document.getElementById('fCost').value)||0,bundle:parseInt(document.getElementById('fBundle').value)||1,notes:document.getElementById('fNotes').value.trim()};
  if(editId){const i=spools.findIndex(x=>x.id===editId);if(i>=0)spools[i]={...d,id:editId}}else spools.push({...d,id:uid()});
  editId=null;saveS();buildBrandFilter();renderStats();renderInventory();showTab('inventory');
}

function doExportCSV(){
  const rows=[['Brand','Name','Type','Color','Size(g)','Remaining(%)','Cost($)','Bundle','$/kg','Notes']];
  spools.forEach(s=>rows.push([s.brand,s.name,s.type,s.color,s.size,s.remaining,s.cost||0,s.bundle||1,s.cost&&s.size?((s.cost/(s.size/1000)).toFixed(2)):'',s.notes||'']));
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='filament_inventory.csv';a.click();URL.revokeObjectURL(u);
}

function toggleCB(){document.getElementById('cbRow').style.display=document.getElementById('fBrandSel').value==='Custom...'?'':'none'}

function showTab(tab){
  ['shop','inventory','wishlist','add'].forEach(t=>{
    document.getElementById('pane-'+t).style.display=t===tab?'':'none';
    const el=document.getElementById('t-'+t);if(el)el.classList.toggle('active',t===tab);
  });
  if(tab==='add'&&!editId){document.getElementById('formTitle').textContent='Add spool';document.getElementById('delBtn').style.display='none';editId=null;}
  if(tab==='shop'){buildFamilySwatches();}
}

document.getElementById('sPrice')||0;

load();
</script>
