<style>
:root{
--dk-bg:#0f1117;--dk-surface:#181b24;--dk-card:#1e2130;--dk-border:#2a2f3e;--dk-border2:#363d52;
--dk-text:#e8eaf0;--dk-muted:#8b90a0;--dk-hint:#555b6e;
--dk-green:#3ddc84;--dk-red:#ff5c5c;--dk-blue:#5b9cf6;--dk-amber:#f5a623;--dk-purple:#a78bfa;--dk-pink:#f472b6;--dk-teal:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0}
.app{background:var(--dk-bg);color:var(--dk-text);font-family:var(--font-sans);min-height:100vh;padding:0 0 2rem}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
input,select,textarea,button{font-family:var(--font-sans)}
input[type=text],input[type=number],select{background:var(--dk-surface);border:1px solid var(--dk-border);color:var(--dk-text);border-radius:6px;font-size:12px;padding:5px 9px;height:30px;outline:none}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--dk-blue)}
select option{background:var(--dk-surface);color:var(--dk-text)}
input[type=color]{background:var(--dk-surface);border:1px solid var(--dk-border);border-radius:6px;height:32px;padding:2px 4px;cursor:pointer;width:100%}
.btn{font-size:12px;padding:4px 12px;height:30px;cursor:pointer;border-radius:6px;border:1px solid var(--dk-border2);background:transparent;color:var(--dk-text);display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:background .12s}
.btn:hover{background:var(--dk-surface)}
.btn.primary{background:var(--dk-blue);color:#fff;border-color:var(--dk-blue)}
.btn.primary:hover{opacity:.88}
.btn.sm{font-size:11px;height:24px;padding:2px 9px}
.btn.success{color:var(--dk-green);border-color:#2a5c3f}
.btn.success:hover{background:#1a3328}
.btn.danger{color:var(--dk-red);border-color:#5c2a2a}
.btn.danger:hover{background:#3a1a1a}
.btn.wish{color:var(--dk-blue);border-color:#1e3a5c}
.btn.wish:hover{background:#0d2a44}

.top-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px;padding:1.2rem 0 .8rem;border-bottom:1px solid var(--dk-border);margin-bottom:1rem}
.top-title{font-size:18px;font-weight:500;color:var(--dk-text)}
.top-sub{font-size:11px;color:var(--dk-muted);margin-top:2px}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1rem}
.stat{background:var(--dk-surface);border:1px solid var(--dk-border);border-radius:8px;padding:.6rem .85rem}
.stat-l{font-size:11px;color:var(--dk-muted);margin-bottom:3px}
.stat-v{font-size:19px;font-weight:500;color:var(--dk-text)}
.stat-v.red{color:var(--dk-red)}.stat-v.grn{color:var(--dk-green)}.stat-v.blue{color:var(--dk-blue)}

.tabs{display:flex;border-bottom:1px solid var(--dk-border);margin-bottom:1rem}
.tab{font-size:12px;padding:7px 14px;cursor:pointer;border:none;background:none;color:var(--dk-muted);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--dk-text)}
.tab.active{color:var(--dk-blue);border-bottom-color:var(--dk-blue);font-weight:500}

.toolbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.8rem;align-items:center}

.badge{display:inline-flex;align-items:center;font-size:10px;padding:1px 6px;border-radius:5px;font-weight:500}
.badge.pla{background:#1a3320;color:#3ddc84}.badge.petg{background:#1a2e4a;color:#5b9cf6}
.badge.abs{background:#4a2010;color:#f5a623}.badge.tpu{background:#3a1a3a;color:#d472f6}
.badge.asa{background:#4a2a10;color:#f5c642}.badge.pa{background:#2a1a4a;color:#a78bfa}
.badge.cf{background:#1e2020;color:#8b90a0}.badge.other{background:#222;color:#8b90a0}
.badge.in{background:#1a3320;color:#3ddc84}.badge.out{background:#3a1a1a;color:#ff5c5c}
.badge.wish{background:#1a2e4a;color:#5b9cf6}
.count-bar{font-size:11px;color:var(--dk-muted);margin-bottom:.6rem}

/* COLOR PALETTE */
.pal-bar{margin-bottom:1rem;padding:.85rem;background:var(--dk-surface);border-radius:10px;border:1px solid var(--dk-border)}
.pal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pal-header span{font-size:12px;font-weight:500;color:var(--dk-text)}
.families{display:flex;flex-direction:column;gap:10px}
.family-row{display:flex;align-items:center;gap:8px}
.family-name{font-size:10px;color:var(--dk-muted);width:68px;flex-shrink:0;text-align:right}
.swatches{display:flex;flex-wrap:wrap;gap:5px}
.sw{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s,border-color .1s;flex-shrink:0}
.sw:hover{transform:scale(1.18)}
.sw.active{border-color:#fff;transform:scale(1.18)}
.active-label{font-size:11px;color:var(--dk-muted);margin-top:6px;min-height:15px}

/* SHOP LIST */
.shop-list{display:flex;flex-direction:column;gap:5px}
.shop-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border:1px solid var(--dk-border);border-radius:8px;background:var(--dk-card)}
.shop-row:hover{border-color:var(--dk-border2)}
.sw-lg{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);flex-shrink:0}
.row-info{flex:1;min-width:0}
.row-name{font-size:12px;font-weight:500;color:var(--dk-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{display:flex;gap:5px;align-items:center;margin-top:2px;flex-wrap:wrap}
.row-price{font-size:12px;font-weight:500;color:var(--dk-text);white-space:nowrap;margin-right:4px}
.row-acts{display:flex;gap:4px;flex-shrink:0}

/* BRAND GRID */
.brand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.brand-card{background:var(--dk-card);border:1px solid var(--dk-border);border-radius:10px;padding:.9rem}
.brand-card:hover{border-color:var(--dk-border2)}
.brand-hdr{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.brand-ico{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.mini-sw{width:20px;height:20px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);cursor:pointer;flex-shrink:0;transition:transform .1s}
.mini-sw:hover{transform:scale(1.25)}
.mini-swatches{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}

/* INVENTORY */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px}
.inv-card{background:var(--dk-card);border:1px solid var(--dk-border);border-radius:10px;padding:.85rem}
.inv-card:hover{border-color:var(--dk-border2)}
.inv-card.low{border-left:3px solid var(--dk-red);border-radius:0 10px 10px 0}
.inv-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.dot{border-radius:50%;border:1px solid rgba(255,255,255,0.12);flex-shrink:0}
.inv-name{font-size:13px;font-weight:500;color:var(--dk-text);line-height:1.3}
.inv-brand{font-size:11px;color:var(--dk-muted)}
.inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:2px 7px;font-size:11px;margin-bottom:7px}
.inv-meta span{color:var(--dk-muted)}
.inv-meta strong{color:var(--dk-text);font-weight:500}
.prog{height:4px;background:var(--dk-border);border-radius:2px;overflow:hidden;margin-bottom:6px}
.prog-f{height:100%;border-radius:2px}
.inv-acts{display:flex;gap:5px}
.inv-acts .btn{flex:1;justify-content:center}

/* ADD FORM */
.form-wrap{background:var(--dk-card);border:1px solid var(--dk-border);border-radius:10px;padding:1.1rem;max-width:480px;margin:0 auto}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg.full{grid-column:1/-1}
.fg label{font-size:11px;color:var(--dk-muted)}
.form-acts{display:flex;justify-content:flex-end;gap:7px;margin-top:.9rem}

/* WISHLIST */
.wish-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--dk-border);border-radius:8px;margin-bottom:6px;background:var(--dk-card)}
.wish-item:hover{border-color:var(--dk-border2)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--dk-muted);font-size:13px}
@media(max-width:460px){.form-grid{grid-template-columns:1fr}}
</style>

<div class="app">
<h2 class="sr-only">Filament tracker — dark mode shop browser with 300+ filaments across 25 brands, inventory management, and wishlist</h2>

<div class="top-bar">
  <div>
    <div class="top-title">Filament tracker</div>
    <div class="top-sub">300+ products · 25 brands · dark mode</div>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <button class="btn" onclick="doCSV()">Export CSV</button>
    <button class="btn primary" onclick="showTab('add')">+ Add spool</button>
  </div>
</div>

<div class="stats-row" id="stats-row"></div>

<div class="tabs">
  <button class="tab active" id="t-shop" onclick="showTab('shop')">Shop browser</button>

  <button class="tab" id="t-wishlist" onclick="showTab('wishlist')">Wishlist</button>

</div>

<div id="pane-shop">

    <select id="sType" onchange="renderShop()">

      <option>PLA</option><option>PLA+</option><option>PETG</option><option>ABS</option><option>TPU</option><option>ASA</option><option>PA</option><option>CF</option><option>Other</option>

      <option value="in">In stock</option>
      <option value="out">Out of stock</option>

    <select id="sPrice" onchange="renderShop()">

      <option value="20">Under $20</option>
      <option value="30">Under $30</option>
      <option value="50">Under $50</option>
    </select>
    <select id="sView" onchange="renderShop()">

      <option value="list">List view</option>
      <option value="brand">By brand</option>

  </div>
  <div class="count-bar" id="sCount"></div>
  <div id="shop-content"></div>
</div>

<div id="pane-inventory" style="display:none">

    <input type="text" id="iSearch" placeholder="Search..." oninput="renderInv()"/>

    <select id="iType" onchange="renderInv()">
      <option value="">All types</option>

    </select>
    <select id="iStock" onchange="renderInv()">
      <option value="">All stock</option>
      <option value="low">Low (&lt;25%)</option>
      <option value="ok">OK</option>
    </select>
    <select id="iSort" onchange="renderInv()">
      <option value="name">Name</option><option value="brand">Brand</option>
      <option value="remaining">Remaining</option><option value="cost">Cost</option>
    </select>
  </div>
  <div class="count-bar" id="iCount"></div>
  <div class="inv-grid" id="inv-grid"></div>
</div>

<div id="pane-wishlist" style="display:none">
  <div class="count-bar" id="wCount"></div>
  <div id="wish-list"></div>
</div>

<div id="pane-add" style="display:none">
  <div class="form-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem">
      <span style="font-size:15px;font-weight:500;color:var(--dk-text)" id="formTitle">Add spool</span>
      <button class="btn sm" onclick="showTab('inventory')">Cancel</button>

    <div class="form-grid">
      <div class="fg full"><label>Filament name</label><input id="fName" type="text" placeholder="e.g. PLA Basic – Jade White"/></div>

          <option>Raise3D</option><option>Proto-pasta</option><option>Matter3D</option><option>Gizmo Dorks</option>
          <option>IC3D</option><option>Custom...</option>
        </select>
      </div>
      <div class="fg" id="cbRow" style="display:none"><label>Custom brand</label><input id="fBrandCustom" type="text"/></div>
      <div class="fg"><label>Type</label>
        <select id="fTypeIn"><option>PLA</option><option>PLA+</option><option>PETG</option><option>ABS</option><option>TPU</option><option>ASA</option><option>PA</option><option>CF</option><option>Other</option></select>
      </div>
      <div class="fg"><label>Color name</label><input id="fColorName" type="text" placeholder="e.g. Galaxy Black"/></div>
      <div class="fg"><label>Color swatch</label><input id="fColorHex" type="color" value="#ffffff"/></div>
      <div class="fg"><label>Size</label>
        <select id="fSize"><option value="250">250g</option><option value="500">500g</option><option value="750">750g</option><option value="850">850g</option><option value="1000" selected>1 kg</option><option value="2000">2 kg</option><option value="3000">3 kg</option></select>
      </div>
      <div class="fg"><label>Remaining (%)</label><input id="fRemain" type="number" min="0" max="100" value="100"/></div>
      <div class="fg"><label>Cost ($)</label><input id="fCost" type="number" min="0" step="0.01" placeholder="0.00"/></div>
      <div class="fg"><label>Qty</label><input id="fBundle" type="number" min="1" value="1"/></div>
      <div class="fg full"><label>Notes</label><input id="fNotes" type="text" placeholder="Optional notes"/></div>
    </div>
    <div class="form-acts">
      <button class="btn danger sm" id="delBtn" style="display:none;margin-right:auto" onclick="doDelete()">Remove</button>
      <button class="btn primary" onclick="doSave()">Save spool</button>
    </div>
  </div>
</div>
</div>

const BRAND_CLR={BambuLab:'#4caf50',Anycubic:'#E24B4A',Sunlu:'#5b9cf6',Polymaker:'#a78bfa',Prusament:'#f5a623',Hatchbox:'#34d399',eSUN:'#f97316',Overture:'#f472b6',Creality:'#fa6400',Elegoo:'#3b82f6',Inland:'#ef4444',Matter3D:'#64748b',Amolen:'#b87333',Duramic:'#14b8a6',Eryone:'#a855f7',Fiberlogy:'#22c55e',FormFutura:'#3b82f6',Fillamentum:'#f97316',ColorFabb:'#ef4444','3DXTech':'#475569',Raise3D:'#8b5cf6',Ultimaker:'#00b4d8','Proto-pasta':'#dc2626','Gizmo Dorks':'#10b981',IC3D:'#6366f1'};

function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function cdist(h1,h2){const[r1,g1,b1]=hexToRgb(h1),[r2,g2,b2]=hexToRgb(h2);return Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2)}
function mch(ih,fh){return cdist(ih,fh)<COLOR_DIST}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function sz(s){return s>=1000?(s/1000)+'kg':s+'g'}
function bc(t){return{PLA:'pla','PLA+':'pla',PETG:'petg',ABS:'abs',TPU:'tpu',ASA:'asa',PA:'pa',CF:'cf'}[t]||'other'}
function pc(p){return p<15?'#ff5c5c':p<30?'#f5a623':'#3ddc84'}
function bi(b){const c=BRAND_CLR[b]||'#5b9cf6';return`<div class="brand-ico" style="background:${c}20;color:${c}">${b.slice(0,2).toUpperCase()}</div>`}

async function load(){
  try{const r=await window.storage.get(SK);if(r&&r.value)spools=JSON.parse(r.value)}catch(e){}
  try{const r=await window.storage.get(WK);if(r&&r.value)wishlist=JSON.parse(r.value)}catch(e){}
  if(!spools.length)spools=[
    {id:uid(),name:'PLA Basic',brand:'BambuLab',type:'PLA',color:'Jade White',hex:'#f5f5f0',size:1000,remaining:85,cost:24.99,bundle:1,notes:''},
    {id:uid(),name:'PLA Basic',brand:'BambuLab',type:'PLA',color:'Bambu Green',hex:'#5aaf6e',size:1000,remaining:30,cost:24.99,bundle:1,notes:''},
    {id:uid(),name:'PolyTerra PLA',brand:'Polymaker',type:'PLA',color:'Muted Blue',hex:'#5b8fa8',size:1000,remaining:60,cost:19.99,bundle:1,notes:'Matte'},
    {id:uid(),name:'PETG',brand:'Sunlu',type:'PETG',color:'Transparent',hex:'#d0e8f2',size:1000,remaining:12,cost:16.99,bundle:3,notes:'Low!'},
  ];
  buildBrandFilter();buildSwatches();renderStats();renderShop();renderInv();renderWishlist();
}
async function saveS(){try{await window.storage.set(SK,JSON.stringify(spools))}catch(e){}}
async function saveW(){try{await window.storage.set(WK,JSON.stringify(wishlist))}catch(e){}}

function buildBrandFilter(){
  const brands=[...new Set(CATALOG.map(c=>c.brand))].sort();
  const el=document.getElementById('sBrand'),cur=el.value;
  el.innerHTML='<option value="">All brands</option>'+brands.map(b=>`<option${b===cur?' selected':''}>${b}</option>`).join('');
  const ib=document.getElementById('iBrand'),ic=ib.value;
  const mb=[...new Set(spools.map(s=>s.brand))].sort();
  ib.innerHTML='<option value="">All brands</option>'+mb.map(b=>`<option${b===ic?' selected':''}>${b}</option>`).join('');
}

function buildSwatches(){
  const el=document.getElementById('fam-swatches');
  el.innerHTML=FAMILIES.map(f=>`
    <div class="family-row">
      <div class="family-name">${f.name}</div>
      <div class="swatches">${f.swatches.map(s=>`<div class="sw${selHex===s.h?' active':''}" style="background:${s.h}" title="${s.l}" onclick="setFilter('${s.h}','${s.l}')"></div>`).join('')}</div>
    </div>
  `).join('');
}

function setFilter(h,n){
  selHex=selHex===h?null:h;selName=selHex?n:'';
  document.getElementById('act-lbl').textContent=selHex?`Showing: ${selName} — click swatch again to clear`:'';
  buildSwatches();renderShop();
}
function clrFilter(){selHex=null;selName='';document.getElementById('act-lbl').textContent='';buildSwatches();renderShop();}

function getCatalog(){
  const search=document.getElementById('sSearch').value.toLowerCase();
  const brand=document.getElementById('sBrand').value;
  const type=document.getElementById('sType').value;
  const avail=document.getElementById('sAvail').value;
  const maxP=parseFloat(document.getElementById('sPrice').value)||Infinity;
  return CATALOG.filter(c=>{
    if(search&&!`${c.name} ${c.brand} ${c.color} ${c.type}`.toLowerCase().includes(search))return false;
    if(brand&&c.brand!==brand)return false;
    if(type&&c.type!==type&&!(type==='PLA'&&c.type==='PLA+')&&!(type==='PLA+'&&c.type==='PLA'))return false;
    if(avail==='in'&&!c.inStock)return false;
    if(avail==='out'&&c.inStock)return false;
    if(c.price>maxP)return false;
    if(selHex&&!mch(c.hex,selHex))return false;
    return true;
  });
}

function renderShop(){
  const items=getCatalog();
  const view=document.getElementById('sView').value;
  document.getElementById('sCount').textContent=`${items.length} product${items.length!==1?'s':''} across ${[...new Set(items.map(c=>c.brand))].length} brands`;
  const el=document.getElementById('shop-content');
  if(!items.length){el.innerHTML='<div class="empty">No products match your filters.</div>';return}
  if(view==='list'){
    el.innerHTML=`<div class="shop-list">${items.map(shopRow).join('')}</div>`;
  } else if(view==='brand'){
    const byB={};items.forEach(c=>{if(!byB[c.brand])byB[c.brand]=[];byB[c.brand].push(c)});
    el.innerHTML=`<div class="brand-grid">${Object.entries(byB).map(([b,list])=>`
      <div class="brand-card">
        <div class="brand-hdr">${bi(b)}<div><div style="font-size:13px;font-weight:500;color:var(--dk-text)">${b}</div><div style="font-size:11px;color:var(--dk-muted)">${list.length} products</div></div></div>
        <div class="mini-swatches">${list.map(c=>`<div class="mini-sw" style="background:${c.hex}" title="${c.color} – ${c.name} $${c.price.toFixed(2)} ${c.inStock?'(in stock)':'(out)'}"></div>`).join('')}</div>
        <div class="shop-list">${list.slice(0,4).map(shopRow).join('')}${list.length>4?`<div style="font-size:11px;color:var(--dk-muted);padding:4px 8px">+${list.length-4} more — use list view</div>`:''}</div>
      </div>`).join('')}</div>`;
  } else {
    const byF=[];
    FAMILIES.forEach(f=>{
      const fi=items.filter(c=>f.swatches.some(s=>mch(c.hex,s.h)));
      if(fi.length)byF.push({name:f.name,items:fi});
    });
    const uncat=items.filter(c=>!FAMILIES.some(f=>f.swatches.some(s=>mch(c.hex,s.h))));
    if(uncat.length)byF.push({name:'Other',items:uncat});
    el.innerHTML=byF.map(({name,items:gi})=>`
      <div style="margin-bottom:1.2rem">
        <div style="font-size:11px;font-weight:500;color:var(--dk-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">${name} <span style="font-weight:400;opacity:.7">(${gi.length})</span></div>
        <div class="shop-list">${gi.map(shopRow).join('')}</div>
      </div>`).join('');
  }
}

function shopRow(c){
  const esc=JSON.stringify(c).replace(/"/g,'&quot;');
  return`<div class="shop-row">
    <div class="sw-lg" style="background:${c.hex}"></div>
    <div class="row-info">
      <div class="row-name">${c.brand} ${c.name} – ${c.color}</div>
      <div class="row-sub">
        <span class="badge ${bc(c.type)}">${c.type}</span>
        <span class="badge ${c.inStock?'in':'out'}">${c.inStock?'In stock':'Out of stock'}</span>
        <span style="font-size:10px;color:var(--dk-muted)">${sz(c.size)}</span>
      </div>
    </div>
    <span class="row-price">$${c.price.toFixed(2)}</span>
    <div class="row-acts">
      ${c.inStock?`<button class="btn sm success" onclick="addToInv(${esc})">+ Add</button>`:`<button class="btn sm wish" onclick="addToWish(${esc})">Wishlist</button>`}
    </div>
  </div>`;
}

function addToInv(c){spools.push({id:uid(),name:c.name,brand:c.brand,type:c.type,color:c.color,hex:c.hex,size:c.size,remaining:100,cost:c.price,bundle:1,notes:''});saveS();buildBrandFilter();renderStats();renderInv();showTab('inventory');}
function addToWish(c){if(wishlist.find(w=>w.brand===c.brand&&w.name===c.name&&w.color===c.color))return;wishlist.push({...c,wid:uid()});saveW();renderStats();renderWishlist();showTab('wishlist');}

function renderInv(){
  const search=document.getElementById('iSearch').value.toLowerCase();
  const brand=document.getElementById('iBrand').value;
  const type=document.getElementById('iType').value;
  const stock=document.getElementById('iStock').value;
  const sort=document.getElementById('iSort').value;
  let f=spools.filter(s=>{
    if(search&&!`${s.name} ${s.brand} ${s.color} ${s.type}`.toLowerCase().includes(search))return false;
    if(brand&&s.brand!==brand)return false;
    if(type&&s.type!==type)return false;
    if(stock==='low'&&s.remaining>=25)return false;
    if(stock==='ok'&&s.remaining<25)return false;
    return true;
  });
  f.sort((a,b)=>sort==='cost'?(b.cost||0)-(a.cost||0):sort==='remaining'?a.remaining-b.remaining:sort==='brand'?a.brand.localeCompare(b.brand):a.name.localeCompare(b.name));
  document.getElementById('iCount').textContent=`${f.length} of ${spools.length} spools`;
  const g=document.getElementById('inv-grid');
  if(!f.length){g.innerHTML='<div class="empty">No spools match your filters.</div>';return}
  g.innerHTML=f.map(s=>{
    const pct=Math.round(s.remaining),gr=Math.round(s.size*pct/100),low=pct<25;
    return`<div class="inv-card${low?' low':''}">
      <div class="inv-top">
        <div class="dot" style="background:${s.hex};width:30px;height:30px"></div>
        <div style="flex:1;min-width:0"><div class="inv-name">${s.name}</div><div class="inv-brand">${s.brand} · ${s.color}</div></div>
        <span class="badge ${bc(s.type)}">${s.type}</span>
      </div>
      <div class="prog"><div class="prog-f" style="width:${pct}%;background:${pc(pct)}"></div></div>
      <div class="inv-meta">
        <span>Remaining</span><strong>${pct}% (~${gr}g)</strong>
        <span>Size</span><strong>${sz(s.size)}</strong>
        <span>Cost</span><strong>$${((s.cost||0)*(s.bundle||1)).toFixed(2)}</strong>
        <span>$/kg</span><strong>${s.cost&&s.size?'$'+((s.cost/(s.size/1000)).toFixed(2)):'—'}</strong>
      </div>
      ${s.notes?`<div style="font-size:11px;color:var(--dk-muted);margin-bottom:6px;font-style:italic">${s.notes}</div>`:''}
      <div class="inv-acts">
        <button class="btn sm" onclick="useSpool('${s.id}')">Use</button>
        <button class="btn sm" onclick="editSpool('${s.id}')">Edit</button>
        <button class="btn sm danger" onclick="delSpool('${s.id}')">Remove</button>
      </div>
    </div>`;
  }).join('');
}

function renderWishlist(){
  const g=document.getElementById('wish-list');
  document.getElementById('wCount').textContent=`${wishlist.length} item${wishlist.length!==1?'s':''} on wishlist`;
  if(!wishlist.length){g.innerHTML='<div class="empty">Browse the shop and add out-of-stock items to track here.</div>';return}
  g.innerHTML=wishlist.map(w=>`
    <div class="wish-item">
      <div class="dot" style="background:${w.hex};width:28px;height:28px"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;color:var(--dk-text)">${w.brand} ${w.name} – ${w.color}</div>
        <div style="display:flex;gap:5px;margin-top:2px;flex-wrap:wrap">
          <span class="badge ${bc(w.type)}">${w.type}</span>
          <span style="font-size:11px;color:var(--dk-muted)">$${w.price.toFixed(2)} · ${sz(w.size)}</span>
        </div>
      </div>
      <div style="display:flex;gap:5px">
        <a href="${w.url}" class="btn sm">Buy</a>
        <button class="btn sm danger" onclick="rmWish('${w.wid}')">Remove</button>
      </div>
    </div>`).join('');
}

function renderStats(){
  const total=spools.length,low=spools.filter(s=>s.remaining<25).length;
  const val=spools.reduce((a,s)=>a+(s.cost||0)*(s.bundle||1),0);
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="stat-l">My spools</div><div class="stat-v">${total}</div></div>
    <div class="stat"><div class="stat-l">Low stock</div><div class="stat-v red">${low}</div></div>
    <div class="stat"><div class="stat-l">Wishlist</div><div class="stat-v blue">${wishlist.length}</div></div>
    <div class="stat"><div class="stat-l">Inventory value</div><div class="stat-v">$${val.toFixed(0)}</div></div>
    <div class="stat"><div class="stat-l">Shop catalog</div><div class="stat-v grn">${CATALOG.filter(c=>c.inStock).length} in stock</div></div>
  `;
}

function useSpool(id){const s=spools.find(x=>x.id===id);if(!s)return;const a=prompt(`Grams used from "${s.name} – ${s.color}"?\n(~${Math.round(s.size*s.remaining/100)}g left)`);if(a===null)return;const g=parseFloat(a);if(isNaN(g)||g<0)return;s.remaining=Math.max(0,Math.round(s.remaining-(g/s.size*100)));saveS();renderStats();renderInv();}
function editSpool(id){const s=spools.find(x=>x.id===id);if(!s)return;editId=id;document.getElementById('formTitle').textContent='Edit spool';document.getElementById('delBtn').style.display='';document.getElementById('fName').value=s.name;const bs=document.getElementById('fBrandSel');if([...bs.options].some(o=>o.value===s.brand)){bs.value=s.brand;document.getElementById('cbRow').style.display='none'}else{bs.value='Custom...';document.getElementById('cbRow').style.display='';document.getElementById('fBrandCustom').value=s.brand}document.getElementById('fTypeIn').value=s.type;document.getElementById('fColorName').value=s.color;document.getElementById('fColorHex').value=s.hex||'#cccccc';document.getElementById('fSize').value=s.size;document.getElementById('fRemain').value=s.remaining;document.getElementById('fCost').value=s.cost||'';document.getElementById('fBundle').value=s.bundle||1;document.getElementById('fNotes').value=s.notes||'';showTab('add');}
function delSpool(id){if(!confirm('Remove this spool?'))return;spools=spools.filter(x=>x.id!==id);saveS();buildBrandFilter();renderStats();renderInv();}
function doDelete(){if(!editId)return;if(!confirm('Remove this spool?'))return;spools=spools.filter(x=>x.id!==editId);editId=null;saveS();buildBrandFilter();renderStats();renderInv();showTab('inventory');}
function rmWish(wid){wishlist=wishlist.filter(w=>w.wid!==wid);saveW();renderStats();renderWishlist();}
function doSave(){const bv=document.getElementById('fBrandSel').value,brand=bv==='Custom...'?document.getElementById('fBrandCustom').value.trim():bv;const d={name:document.getElementById('fName').value.trim()||'Unnamed',brand:brand||'Unknown',type:document.getElementById('fTypeIn').value,color:document.getElementById('fColorName').value.trim()||'Unknown',hex:document.getElementById('fColorHex').value,size:parseInt(document.getElementById('fSize').value),remaining:Math.max(0,Math.min(100,parseFloat(document.getElementById('fRemain').value)||0)),cost:parseFloat(document.getElementById('fCost').value)||0,bundle:parseInt(document.getElementById('fBundle').value)||1,notes:document.getElementById('fNotes').value.trim()};if(editId){const i=spools.findIndex(x=>x.id===editId);if(i>=0)spools[i]={...d,id:editId}}else spools.push({...d,id:uid()});editId=null;saveS();buildBrandFilter();renderStats();renderInv();showTab('inventory');}
function toggleCB(){document.getElementById('cbRow').style.display=document.getElementById('fBrandSel').value==='Custom...'?'':'none'}
function doCSV(){const rows=[['Brand','Name','Type','Color','Size(g)','Remaining(%)','Cost($)','Bundle','$/kg','Notes']];spools.forEach(s=>rows.push([s.brand,s.name,s.type,s.color,s.size,s.remaining,s.cost||0,s.bundle||1,s.cost&&s.size?((s.cost/(s.size/1000)).toFixed(2)):'',s.notes||'']));const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');try{const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='filament.csv';a.click();URL.revokeObjectURL(u)}catch(e){alert('CSV:\n\n'+csv)}}
function showTab(tab){['shop','inventory','wishlist','add'].forEach(t=>{document.getElementById('pane-'+t).style.display=t===tab?'':'none';const el=document.getElementById('t-'+t);if(el)el.classList.toggle('active',t===tab)});if(tab==='add'&&!editId){document.getElementById('formTitle').textContent='Add spool';document.getElementById('delBtn').style.display='none';editId=null}if(tab==='shop')buildSwatches();}
load();
</script>
